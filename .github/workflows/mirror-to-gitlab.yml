name: Mirror to GitLab

on:
  push:
    branches: ["**"]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git push --prune https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/kondwanimuwowo/smilefxtraders.git '+refs/heads/*:refs/heads/*' '+refs/tags/*:refs/tags/*'
